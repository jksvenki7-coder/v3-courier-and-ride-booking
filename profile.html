<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Profile | V3 Group of Business</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header class="header">

<div class="container">

<a href="index.html" class="logo">

<img src="assets/logo.png" alt="Logo">

<div>

<h2>V3 Group of Business</h2>

<p>Courier & Ride Booking</p>

</div>

</a>

</div>

</header>

<section class="booking">

<div class="container">

<div class="profile-card">

<img
id="profileImage"
src="assets/images/user.png"
alt="Profile">

<br>

<input
type="file"
id="imageUpload"
accept="image/*">

<br><br>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email Address">

<input
type="text"
id="mobile"
readonly>

<textarea
id="address"
placeholder="Address"></textarea>

<input
type="text"
id="city"
placeholder="City">

<input
type="text"
id="state"
placeholder="State">

<input
type="text"
id="pincode"
placeholder="Pincode">

<button
id="saveProfile">

Save Profile

</button>

<br><br>

<button
id="logout">

Logout

</button>

</div>

</div>

</section>

<footer class="footer">

<div class="container">

<p style="text-align:center;">

© 2026 V3 Group of Business

</p>

</div>

</footer>

<script type="module" src="js/profile.js"></script>

</body>

</html>
