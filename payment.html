<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment | V3 Group of Business</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<header class="header">

<div class="container">

<a href="index.html" class="logo">

<img src="assets/logo.png" alt="Logo">

<div>

<h2>V3 Group of Business</h2>

<p>Secure Payment</p>

</div>

</a>

</div>

</header>

<section class="booking">

<div class="container">

<div class="profile-card">

<h2>Payment</h2>

<p><strong>Booking ID :</strong>
<span id="bookingId"></span></p>

<p><strong>Customer :</strong>
<span id="customerName"></span></p>

<p><strong>Total Amount :</strong>

₹<span id="amount"></span>

</p>

<hr>

<h3>Select Payment Method</h3>

<label>

<input type="radio"
name="payment"
value="COD"
checked>

Cash on Delivery

</label>

<br><br>

<label>

<input type="radio"
name="payment"
value="UPI">

UPI

</label>

<br><br>

<label>

<input type="radio"
name="payment"
value="PhonePe">

PhonePe

</label>

<br><br>

<label>

<input type="radio"
name="payment"
value="GooglePay">

Google Pay

</label>

<br><br>

<label>

<input type="radio"
name="payment"
value="Razorpay">

Razorpay

</label>

<br><br>

<button id="payNow"

class="primary-btn">

Proceed Payment

</button>

</div>

</div>

</section>

<footer class="footer">

<div class="container">

<p style="text-align:center;">

© 2026 V3 Group of Business

</p>

</div>

</footer>

src="js/payment.js">

</script>
